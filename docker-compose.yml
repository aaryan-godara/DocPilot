# ==================================================
# DocPilot — Docker Compose
#
# Usage:
#   docker compose up --build          # Build and start both services
#   docker compose up -d               # Start in background
#   docker compose down                # Stop and remove containers
#   docker compose logs -f             # Follow logs from all services
#
# Services:
#   backend   — FastAPI on http://localhost:8000
#   frontend  — Streamlit on http://localhost:8501
#
# Data is persisted in ./data (ChromaDB + uploaded PDFs survive restarts)
# ==================================================

services:
  # ------------------------------------------------
  # FastAPI Backend
  # ------------------------------------------------
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      # Mount ./data so ChromaDB and uploads persist across container restarts
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ------------------------------------------------
  # Streamlit Frontend
  # ------------------------------------------------
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "8501:8501"
    env_file:
      - .env
    environment:
      # Override BACKEND_URL to use Docker's internal network (service name = hostname)
      BACKEND_URL: http://backend:8000
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
